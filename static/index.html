<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intel — AI Research Agent</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --black:   #0b0306;
  --red:     #ea0106;
  --sage:    #bbcdbc;
  --white:   #fffcfa;
  --slate:   #576361;
  --border:  rgba(87,99,97,0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

body::after {
  content: '';
  position: fixed;
  top: -120px; left: -120px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(234,1,6,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 880px;
  margin: 0 auto;
  padding: 56px 24px 100px;
}

header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 56px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.masthead {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(42px, 8vw, 72px);
  letter-spacing: -2px;
  line-height: 1;
  color: var(--white);
}

.masthead em { font-style: italic; color: var(--red); }

.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

.tagline {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--slate);
}

.status-dot {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--sage);
  letter-spacing: 1px;
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--sage);
  animation: pulse 2s infinite;
}

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.search-section { margin-bottom: 52px; }

.search-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--slate);
  display: block;
  margin-bottom: 10px;
}

.search-row {
  display: flex;
  border: 1.5px solid var(--border);
  background: rgba(255,252,250,0.03);
  overflow: hidden;
  transition: border-color 0.2s;
}

.search-row:focus-within { border-color: var(--red); }

.search-input {
  flex: 1;
  border: none;
  outline: none;
  padding: 18px 22px;
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  background: transparent;
  color: var(--white);
  caret-color: var(--red);
}

.search-input::placeholder { color: rgba(87,99,97,0.5); }

.search-btn {
  background: var(--red);
  color: var(--white);
  border: none;
  padding: 18px 28px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}

.search-btn:hover { background: #c80005; }
.search-btn:disabled { background: var(--slate); cursor: not-allowed; }

.loading {
  padding: 72px 0;
  text-align: center;
  animation: fadeIn 0.3s ease;
}

.loading-bar {
  width: 200px; height: 2px;
  background: var(--border);
  margin: 0 auto 28px;
  overflow: hidden;
  position: relative;
}

.loading-bar::after {
  content: '';
  position: absolute;
  left: -60%; width: 60%; height: 100%;
  background: var(--red);
  animation: slide 1.2s infinite ease-in-out;
}

@keyframes slide { 0% { left: -60%; } 100% { left: 110%; } }

.loading-head { font-family: 'DM Serif Display', serif; font-size: 26px; margin-bottom: 8px; }
.loading-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--slate); letter-spacing: 2px; }

.brief { animation: fadeUp 0.4s ease; }

.brief-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.brief-company { font-family: 'DM Serif Display', serif; font-size: clamp(36px, 6vw, 56px); line-height: 1; }
.brief-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.run-id { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--slate); letter-spacing: 1px; }

.sentiment-badge {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 5px 10px;
  border: 1px solid currentColor;
}

.sentiment-badge.positive { color: var(--sage); }
.sentiment-badge.negative { color: var(--red); }
.sentiment-badge.neutral  { color: var(--slate); }

.section { margin-bottom: 36px; }

.section-title {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--slate);
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 16px;
}

.summary-text { font-family: 'DM Serif Display', serif; font-size: 19px; line-height: 1.7; }

.meta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 36px;
}

.meta-cell { background: #0f080b; padding: 16px 18px; }
.meta-key { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--slate); margin-bottom: 5px; }
.meta-val { font-size: 13px; font-weight: 500; line-height: 1.4; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 36px; }
@media (max-width: 580px) { .two-col { grid-template-columns: 1fr; } }

.tags { display: flex; flex-wrap: wrap; gap: 6px; }

.tag {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  background: rgba(187,205,188,0.08);
  border: 1px solid rgba(187,205,188,0.2);
  color: var(--sage);
  padding: 4px 10px;
}

.news-list { display: flex; flex-direction: column; }

.news-item {
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 16px;
}

.news-date { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--slate); letter-spacing: 1px; padding-top: 3px; line-height: 1.4; }
.news-headline { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
.news-sig { font-size: 12px; color: var(--slate); line-height: 1.6; }

.sr-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.sr-list li { font-size: 13px; line-height: 1.55; padding-left: 18px; position: relative; color: rgba(255,252,250,0.8); }
.sr-list.strengths li::before { content: '+'; position: absolute; left: 0; color: var(--sage); font-weight: 700; font-family: 'DM Mono', monospace; }
.sr-list.risks li::before    { content: '−'; position: absolute; left: 0; color: var(--red);  font-weight: 700; font-family: 'DM Mono', monospace; }

.tip-box {
  background: var(--red);
  padding: 30px 34px;
  margin-bottom: 36px;
  position: relative;
  overflow: hidden;
}

.tip-box::before {
  content: '"';
  position: absolute;
  top: -20px; left: 20px;
  font-family: 'DM Serif Display', serif;
  font-size: 140px;
  color: rgba(11,3,6,0.2);
  line-height: 1;
  pointer-events: none;
}

.tip-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,252,250,0.6); margin-bottom: 12px; }
.tip-text { font-family: 'DM Serif Display', serif; font-size: 18px; line-height: 1.65; font-style: italic; position: relative; z-index: 1; }

.artifact-line { text-align: center; padding: 8px 0 4px; font-family: 'DM Mono', monospace; font-size: 9px; color: var(--slate); letter-spacing: 1px; }

.error-box { border: 1.5px solid var(--red); padding: 20px 24px; background: rgba(234,1,6,0.06); }
.error-box p { font-size: 13px; color: var(--red); font-family: 'DM Mono', monospace; }

.history-section { margin-top: 64px; border-top: 1px solid var(--border); padding-top: 28px; }
.history-title { font-family: 'DM Serif Display', serif; font-size: 24px; margin-bottom: 20px; }

.history-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: opacity 0.15s;
  gap: 12px;
  flex-wrap: wrap;
}

.history-item:hover { opacity: 0.55; }
.history-company { font-size: 14px; font-weight: 600; }
.history-meta { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--slate); letter-spacing: 1px; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="masthead"><em>Intel</em></div>
    <div class="header-right">
      <div class="tagline">AI Competitive Research · GCP</div>
      <div class="status-dot"><span class="dot"></span>LIVE</div>
    </div>
  </header>

  <div class="search-section">
    <span class="search-label">Research a Company</span>
    <div class="search-row">
      <input class="search-input" id="companyInput" type="text" placeholder="e.g. Stripe, Palantir, Databricks..." />
      <button class="search-btn" id="searchBtn" onclick="runResearch()">Research →</button>
    </div>
  </div>

  <div id="output"></div>

  <div class="history-section" id="historySection" style="display:none">
    <div class="history-title">Recent Research</div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<script>
  const API = '';

  document.getElementById('companyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runResearch();
  });

  async function runResearch() {
    const company = document.getElementById('companyInput').value.trim();
    if (!company) return;

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.textContent = 'Researching...';

    document.getElementById('output').innerHTML = `
      <div class="loading">
        <div class="loading-bar"></div>
        <div class="loading-head">Researching ${company}</div>
        <div class="loading-sub">Searching · Analyzing · Structuring</div>
      </div>`;

    try {
      const res = await fetch(`${API}/research`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ company })
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();
      renderBrief(data);
      loadHistory();
    } catch (err) {
      document.getElementById('output').innerHTML = `
        <div class="error-box"><p>Error: ${err.message}</p></div>`;
    }

    btn.disabled = false;
    btn.textContent = 'Research →';
  }

  function renderBrief(data) {
    const b = data.brief;
    const ts = new Date(data.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const tags = arr => (arr||[]).map(t => `<span class="tag">${t}</span>`).join('');
    const listItems = arr => (arr||[]).map(i => `<li>${i}</li>`).join('');

    const news = (b.recent_news||[]).map(n => `
      <div class="news-item">
        <div class="news-date">${n.date||''}</div>
        <div>
          <div class="news-headline">${n.headline||''}</div>
          <div class="news-sig">${n.significance||''}</div>
        </div>
      </div>`).join('');

    document.getElementById('output').innerHTML = `
      <div class="brief">
        <div class="brief-header">
          <div class="brief-company">${data.company}</div>
          <div class="brief-meta">
            <span class="run-id">RUN #${data.run_id} · ${ts}</span>
            <span class="sentiment-badge ${b.sentiment||'neutral'}">${(b.sentiment||'neutral').toUpperCase()}</span>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Overview</div>
          <div class="summary-text">${b.summary||''}</div>
        </div>

        <div class="meta-grid">
          <div class="meta-cell"><div class="meta-key">Founded</div><div class="meta-val">${b.founded||'—'}</div></div>
          <div class="meta-cell"><div class="meta-key">HQ</div><div class="meta-val">${b.headquarters||'—'}</div></div>
          <div class="meta-cell"><div class="meta-key">Industry</div><div class="meta-val">${b.industry||'—'}</div></div>
          <div class="meta-cell"><div class="meta-key">Business Model</div><div class="meta-val">${b.business_model||'—'}</div></div>
        </div>

        <div class="two-col">
          <div class="section">
            <div class="section-title">Key Products</div>
            <div class="tags">${tags(b.key_products)}</div>
          </div>
          <div class="section">
            <div class="section-title">Key Topics</div>
            <div class="tags">${tags(b.key_topics)}</div>
          </div>
        </div>

        <div class="two-col">
          <div class="section">
            <div class="section-title">Competitors</div>
            <div class="tags">${tags(b.competitors)}</div>
          </div>
          <div class="section" style="display:flex;gap:24px;flex-direction:column;">
            <div>
              <div class="section-title">Strengths</div>
              <ul class="sr-list strengths">${listItems(b.strengths)}</ul>
            </div>
            <div>
              <div class="section-title">Risks</div>
              <ul class="sr-list risks">${listItems(b.risks)}</ul>
            </div>
          </div>
        </div>

        ${news ? `<div class="section"><div class="section-title">Recent News</div><div class="news-list">${news}</div></div>` : ''}

        ${b.interview_tip ? `
        <div class="tip-box">
          <div class="tip-label">Interview Tip</div>
          <div class="tip-text">${b.interview_tip}</div>
        </div>` : ''}

        <div class="artifact-line">Artifact saved · ${data.artifact_url}</div>
      </div>`;
  }

  async function loadHistory() {
    try {
      const res = await fetch(`${API}/history?limit=5`);
      const data = await res.json();
      const runs = data.runs || [];
      if (!runs.length) return;
      document.getElementById('historySection').style.display = 'block';
      document.getElementById('historyList').innerHTML = runs.map(r => `
        <div class="history-item" onclick="document.getElementById('companyInput').value='${r.company}';runResearch()">
          <span class="history-company">${r.company}</span>
          <span class="history-meta">${(r.sentiment||'').toUpperCase()} · ${new Date(r.timestamp).toLocaleDateString()}</span>
        </div>`).join('');
    } catch(e) {}
  }

  loadHistory();
</script>
</body>
</html>
